[build]
  command   = "pnpm install && pnpm --filter @workspace/fazaa run build"
  publish   = "artifacts/fazaa/out"

[build.environment]
  NODE_VERSION              = "20"
  NEXT_TELEMETRY_DISABLED   = "1"

# ── Redirect /api/* → Supabase (not needed; frontend calls Supabase directly) ──
# All routes are handled by the static site.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
